<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>和室リフォーム 見積もり</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet"></noscript>
<style>
:root {
  --bg: #f7f3ec;
  --white: #fff;
  --ink: #1c1608;
  --muted: #7a6e5c;
  --line: #ddd5c2;
  --green: #5c7a4a;
  --green-light: #ddeacc;
  --green-dark: #3d5432;
  --amber: #b8762a;
  --amber-light: #f5e8d0;
  --red: #b03030;
  --shadow: rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; touch-action: manipulation; -webkit-text-size-adjust: 100%; }

.header {
  background: var(--green-dark); color: white;
  padding: 20px 24px; display: flex; align-items: center; gap: 14px;
}
.header-icon { font-size: 28px; }
.header h1 { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 700; }
.header p { font-size: 12px; opacity: 0.7; margin-top: 2px; }

.main { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }

/* STEPS */
.steps {
  display: flex; align-items: center;
  background: var(--white); border-radius: 50px;
  padding: 8px 16px; margin-bottom: 24px;
  box-shadow: 0 2px 8px var(--shadow); overflow-x: auto;
}
.sdot { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.dot {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--line); color: var(--muted);
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s; flex-shrink: 0;
}
.dot.active { background: var(--green); color: white; }
.dot.done { background: var(--green-dark); color: white; }
.sdot span { font-size: 11px; color: var(--muted); white-space: nowrap; }
.sdot span.active { color: var(--green-dark); font-weight: 700; }
.sline { flex: 1; height: 2px; background: var(--line); margin: 0 4px; flex-shrink: 0; min-width: 12px; }
.sline.done { background: var(--green); }

/* CARD */
.card {
  background: var(--white); border-radius: 12px;
  padding: 28px 24px; margin-bottom: 16px;
  box-shadow: 0 2px 12px var(--shadow);
}
.card-heading { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 700; color: var(--green-dark); margin-bottom: 6px; }
.card-sub { font-size: 14px; color: var(--muted); margin-bottom: 22px; line-height: 1.7; }

/* FORM */
.fg { margin-bottom: 18px; }
.fl { font-size: 14px; font-weight: 700; color: var(--green-dark); margin-bottom: 8px; display: block; }
.fl .req { background: var(--red); color: white; font-size: 10px; padding: 1px 6px; border-radius: 3px; margin-left: 6px; }
input[type=text],input[type=tel],input[type=date],input[type=email],textarea {
  font-family: 'Noto Sans JP', sans-serif; font-size: 16px;
  width: 100%; padding: 14px 16px; border: 2px solid var(--line);
  border-radius: 8px; background: var(--bg); color: var(--ink); outline: none; transition: border-color 0.2s;
}
input:focus,textarea:focus { border-color: var(--green); background: white; }
textarea { min-height: 80px; resize: vertical; }

/* GENRE GRID */
.genre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.genre-btn {
  background: var(--white); border: 3px solid var(--line);
  border-radius: 12px; padding: 22px 16px; cursor: pointer;
  text-align: center; transition: all 0.2s; font-family: 'Noto Sans JP', sans-serif;
  position: relative;
}
.genre-btn:hover { border-color: var(--green); transform: translateY(-2px); box-shadow: 0 4px 16px var(--shadow); }
.genre-btn.selected { border-color: var(--green); background: var(--green-light); }
.genre-check {
  position: absolute; top: 10px; right: 10px;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--green-dark); color: white;
  font-size: 12px; display: none; align-items: center; justify-content: center;
}
.genre-btn.selected .genre-check { display: flex; }
.gicon { font-size: 38px; margin-bottom: 8px; }
.gname { font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.gdesc { font-size: 12px; color: var(--muted); }

/* TABS */
.genre-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
.gtab {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 50px; font-size: 14px; font-weight: 500;
  border: 2px solid var(--line); background: var(--white); cursor: pointer; transition: all 0.15s;
  font-family: 'Noto Sans JP', sans-serif;
}
.gtab:hover { border-color: var(--green); }
.gtab.active { border-color: var(--green-dark); background: var(--green-light); color: var(--green-dark); }
.gtab .check { color: var(--green-dark); font-weight: 700; }

/* OPTION LIST */
.sec-title {
  font-size: 14px; font-weight: 700; color: var(--green-dark);
  background: var(--green-light); padding: 10px 14px;
  border-radius: 8px 8px 0 0; border-left: 4px solid var(--green);
  margin-top: 18px;
}
.opts { border: 2px solid var(--green-light); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
.opt {
  display: flex; align-items: center; padding: 15px 16px;
  cursor: pointer; border-bottom: 1px solid var(--line);
  transition: background 0.15s; gap: 14px; background: var(--white);
}
.opt:last-child { border-bottom: none; }
.opt:hover { background: var(--bg); }
.opt.sel { background: var(--green-light); }
.oradio {
  width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--line);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s;
}
.oradio.on { border-color: var(--green); background: var(--green); }
.oradio.on::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: white; }
.oinfo { flex: 1; }
.otitle { font-size: 15px; font-weight: 500; }
.onote { font-size: 12px; color: var(--muted); margin-top: 2px; }
.oprice { font-size: 14px; font-weight: 700; color: var(--amber); white-space: nowrap; }

/* SELECT */
.mat-select {
  width: 100%; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 500;
  padding: 14px 16px; border: 2px solid var(--green-light); border-top: none;
  border-radius: 0 0 8px 8px; background: white; color: var(--ink); outline: none;
  cursor: pointer; appearance: none; -webkit-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%235c7a4a' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");
  background-repeat: no-repeat; background-position: right 16px center; padding-right: 40px;
}
.mat-select:focus { border-color: var(--green); }

/* SIZE GRID */
.size-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 14px; border: 2px solid var(--green-light); border-top: none; border-radius: 0 0 8px 8px; background: white; }
.sbtn {
  border: 2px solid var(--line); border-radius: 8px; padding: 12px 6px;
  text-align: center; cursor: pointer; transition: all 0.15s; background: var(--white);
  font-family: 'Noto Sans JP', sans-serif;
}
.sbtn:hover { border-color: var(--green); }
.sbtn.sel { border-color: var(--green-dark); background: var(--green-light); }
.sbtn .sn { font-size: 15px; font-weight: 700; color: var(--ink); }
.sbtn .sd { font-size: 11px; color: var(--muted); margin-top: 2px; }
.sbtn .sp { font-size: 12px; color: var(--amber); font-weight: 700; margin-top: 4px; }

/* QTY */
.qty-row {
  display: flex; align-items: center; gap: 0;
  margin-top: 16px; background: var(--bg); border-radius: 8px;
  padding: 12px 16px; border: 2px solid var(--line);
}
.ql { font-size: 15px; font-weight: 700; color: var(--green-dark); flex: 1; }
.qc { display: flex; align-items: center; gap: 14px; }
.qb {
  width: 42px; height: 42px; border-radius: 50%;
  border: 2px solid var(--green); background: var(--white);
  color: var(--green-dark); font-size: 24px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; transition: all 0.15s; line-height: 1;
}
.qb:hover { background: var(--green); color: white; }
.qn { font-size: 28px; font-weight: 700; color: var(--green-dark); min-width: 40px; text-align: center; font-family: 'Noto Serif JP', serif; }
.qu { font-size: 14px; color: var(--muted); }

/* SUBTOTAL */
.subtotal-bar {
  text-align: right; margin-top: 14px;
  font-size: 15px; font-weight: 700; color: var(--amber);
}

/* SUMMARY */
.sum-block { margin-bottom: 16px; }
.sum-head {
  font-size: 14px; font-weight: 700; color: var(--green-dark);
  background: var(--green-light); padding: 10px 14px;
  border-radius: 8px 8px 0 0; border-left: 4px solid var(--green);
}
.sum-rows { border: 2px solid var(--green-light); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
.sum-row {
  display: flex; align-items: center; padding: 12px 16px;
  border-bottom: 1px solid var(--line); font-size: 14px; background: white;
}
.sum-row:last-child { border-bottom: none; }
.sum-row .lb { flex: 1; color: var(--muted); }
.sum-row .vl { font-weight: 500; margin-right: 12px; }
.sum-row .pr { font-weight: 700; color: var(--amber); min-width: 90px; text-align: right; }

.total-card {
  background: var(--green-dark); color: white; border-radius: 12px;
  padding: 20px 24px; display: flex; align-items: center;
  justify-content: space-between; margin: 20px 0;
}
.tl { font-size: 16px; font-weight: 700; }
.ts { font-size: 12px; opacity: 0.7; margin-top: 2px; }
.ta { font-size: 30px; font-weight: 700; font-family: 'Noto Serif JP', serif; }
.tx { font-size: 12px; opacity: 0.7; text-align: right; margin-top: 2px; }

.notice {
  font-size: 12px; color: var(--muted); background: var(--bg);
  border: 1px solid var(--line); border-radius: 8px;
  padding: 12px 14px; line-height: 1.9;
}

/* PDF MODE TOGGLE */
.pdf-toggle {
  display: flex; gap: 10px; margin-bottom: 16px;
}
.pdf-toggle-btn {
  flex: 1; padding: 14px; border-radius: 8px; border: 2px solid var(--line);
  background: var(--white); font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; color: var(--ink);
  text-align: center;
}
.pdf-toggle-btn:hover { border-color: var(--green); }
.pdf-toggle-btn.active { border-color: var(--amber); background: var(--amber-light); color: var(--amber); }

/* BTNS */
.btn-row { display: flex; gap: 12px; margin-top: 24px; }
.btn {
  flex: 1; padding: 16px; border-radius: 10px;
  font-size: 16px; font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700; cursor: pointer; border: none; transition: all 0.2s;
}
.btn-back {
  background: var(--white); color: var(--muted);
  border: 2px solid var(--line); flex: 0 0 auto; padding: 16px 20px;
}
.btn-back:hover { border-color: var(--green); color: var(--green-dark); }
.btn-next { background: var(--green); color: white; box-shadow: 0 4px 12px rgba(92,122,74,0.35); }
.btn-next:hover { background: var(--green-dark); transform: translateY(-1px); }
.btn-pdf { background: var(--amber); color: white; box-shadow: 0 4px 12px rgba(184,118,42,0.35); }
.btn-pdf:hover { background: #9a6020; transform: translateY(-1px); }

/* PRINT */
@media print {
  body { background: white; }
  .no-print { display: none !important; }
  .main { padding: 0; max-width: 100%; }
  .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; border-radius: 0; margin-bottom: 8px; }
  .header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .total-card { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .sum-head { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .steps { display: none !important; }
  .print-page-break { page-break-before: always; }
}

@media (max-width: 480px) {
  .genre-grid { grid-template-columns: 1fr 1fr; }
  .card { padding: 20px 16px; }
  .size-grid { grid-template-columns: repeat(2,1fr); }
}
.fade { animation: fu 0.3s ease; }
@keyframes fu { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🏠</div>
  <div>
    <h1>川辺畳店　見積もりシステム</h1>
    <p>TEL: 0966-45-0031　〒868-0408 熊本県球磨郡あさぎり町免田東</p>
  </div>
</div>

<div class="main">
  <div class="steps no-print" id="stepsEl"></div>
  <div id="content"></div>
</div>

<script>
// ===== データ定義 =====
const GENRES = [
  { id:'tatami', icon:'🌿', name:'畳',   desc:'表替え・裏返し・新床' },
  { id:'shoji',  icon:'🪟', name:'障子', desc:'張替え・新品交換' },
  { id:'fusuma', icon:'🚪', name:'襖',   desc:'張替え・新品交換' },
  { id:'amido',  icon:'🔲', name:'網戸', desc:'張替えのみ' },
];

const SIZES = {
  tatami: [],
  shoji: [
    { id:'s',    label:'小サイズ',   note:'幅90〜高45',  add:0 },
    { id:'m',    label:'中サイズ',   note:'幅90〜高120', add:0 },
    { id:'l',    label:'大サイズ',   note:'幅90〜高180', add:0 },
    { id:'yuki', label:'雪見障子',   note:'幅90〜高180', add:0 },
  ],
  fusuma: [
    { id:'tenbukuro', label:'天袋', note:'小さい襖', add:0 },
    { id:'katamen',   label:'片面', note:'通常の襖', add:0 },
  ],
  amido: [
    { id:'s', label:'小サイズ', note:'¥2,200/枚', price:2200 },
    { id:'m', label:'中サイズ', note:'¥3,300/枚', price:3300 },
    { id:'l', label:'大サイズ', note:'¥4,400/枚', price:4400 },
  ],
};

const OPTIONS = {
  tatami: {
    workTypes: [
      { id:'omote', label:'表替え', note:'', price:0 },
    ],
    materials: [
      { id:'kakuyasu', label:'格安品',     note:'アパート・借家向け（江戸間・幅92cm以内）',  add:5800,  price:5800 },
      { id:'otegoro',  label:'お手頃品',   note:'頻繁に替えるお部屋向け',                    add:7800,  price:7800 },
      { id:'fukyu',    label:'普及品',     note:'費用をおさえたい方向け',                    add:9800,  price:9800 },
      { id:'pop3',     label:'人気３番',   note:'当店３番人気・お買い得品',                  add:11800, price:11800 },
      { id:'pop2',     label:'人気２番',   note:'品質と価格バランスのとれた商品',            add:13800, price:13800 },
      { id:'pop1',     label:'人気１番 ⭐', note:'見栄え・耐久性・人気度 ３拍子揃い',        add:15800, price:15800 },
      { id:'osusume',  label:'おすすめ品', note:'店主おすすめ！迷ったらコレ！！',            add:17800, price:17800 },
      { id:'kodawari', label:'こだわり品', note:'使う程に良さが分かる逸品',                  add:20800, price:20800 },
      { id:'koukyuhin',label:'高級品',     note:'熊本産ブランド表・取り寄せ品',              add:33800, price:33800 },
      { id:'uragaeshi',label:'裏返し',     note:'裏面を使う（お手頃）',                      add:4500,  price:4500 },
    ],
    heri: [
      { id:'B', label:'B ランク', note:'スタンダード', add:1200 },
      { id:'A', label:'A ランク', note:'人気の定番',   add:1800 },
      { id:'S', label:'S ランク', note:'高品質',       add:2500 },
    ],
    bochushi: [
      { id:'yes', label:'施工する',    note:'防虫紙を敷く（+¥4,000/枚）', add:4000 },
      { id:'no',  label:'施工しない',  note:'防虫紙なし',                  add:0 },
    ],
    qtyUnit:'枚',
    defaultQty:6,
  },
  shoji: {
    workTypes: [
      { id:'張替え', label:'張替え', note:'枠はそのまま・紙だけ交換', price:0 },
    ],
    // 価格はサイズ×グレードのマトリクスで決まる
    materials: [
      { id:'futsuu',  label:'普通紙',       note:'一般的な白い紙',             add:0 },
      { id:'kyoryoku',label:'強力紙',       note:'破れにくい・丈夫な紙',       add:0 },
      { id:'dezain',  label:'でざいん障子紙',note:'おしゃれなデザイン障子紙',   add:0 },
    ],
    // サイズ×グレードの価格マトリクス
    priceMatrix: {
      s:    { futsuu:2200, kyoryoku:3200, dezain:5500  },
      m:    { futsuu:3000, kyoryoku:4200, dezain:8500  },
      l:    { futsuu:3800, kyoryoku:5500, dezain:12800 },
      yuki: { futsuu:4800, kyoryoku:7500, dezain:15800 },
    },
    tatekuke: 1500, // 建て付け調整 1枚あたり
    qtyUnit:'枚',
    defaultQty:4,
  },
  fusuma: {
    workTypes: [
      { id:'張替え', label:'張替え', note:'枠はそのまま・紙だけ交換', price:0 },
    ],
    materials: [
      { id:'chukyu',  label:'中級品',         note:'スタンダードな襖紙',       add:0 },
      { id:'ninki1',  label:'1番人気',         note:'品質・価格バランス抜群',   add:0 },
      { id:'dezain',  label:'でざいん襖紙',    note:'おしゃれなデザイン襖紙',   add:0 },
    ],
    priceMatrix: {
      tenbukuro: { chukyu:3500, ninki1:4500, dezain:7500  },
      katamen:   { chukyu:5800, ninki1:7800, dezain:12800 },
    },
    tatekuke: 1500,
    qtyUnit:'枚',
    defaultQty:4,
  },
  amido: {
    workTypes: [
      { id:'張替え', label:'張替え', note:'フレームはそのまま・網だけ交換', price:0 },
    ],
    materials: [],
    // サイズのみで価格が決まる
    priceMatrix: {
      s: { only:2200 },
      m: { only:3300 },
      l: { only:4400 },
    },
    qtyUnit:'枚',
    defaultQty:3,
  },
};

// ===== 状態 =====
let step = 2;
let customer = { name:'', address:'', tel:'', desiredDate:'', memo:'' };
let selectedGenres = [];
let selections = {}; // { genreId: { workType, material, size, qty } }
let activeGenre = null;
let pdfMode = 'combined'; // 'combined' | 'separate'
// 枚数は selections[gid].qty で管理（step3で素材等、step3.5で枚数）

function fmt(n){ return n.toLocaleString('ja-JP'); }

function calcUnit(gid){
  const sel = selections[gid];
  if(!sel||!sel.workType) return 0;
  const opt = OPTIONS[gid];
  const wt = opt.workTypes.find(x=>x.id===sel.workType);
  // 障子はマトリクス価格
  if(gid==='shoji'){
    if(!sel.size || !sel.material) return 0;
    return (opt.priceMatrix[sel.size]?.[sel.material]) || 0;
  }
  // 畳の裏返しは素材選択不要・固定価格
  if(gid==='tatami' && sel.material==='uragaeshi') return 4500;
  if(!sel.material) return 0;
  const mt = opt.materials.find(x=>x.id===sel.material);
  const sz = (gid!=='tatami' && sel.size) ? (SIZES[gid]||[]).find(x=>x.id===sel.size) : null;
  const hr = (gid==='tatami' && sel.heri && sel.material!=='uragaeshi') ? (OPTIONS.tatami.heri||[]).find(x=>x.id===sel.heri) : null;
  const bc = (gid==='tatami' && sel.bochushi && sel.material!=='uragaeshi') ? (OPTIONS.tatami.bochushi||[]).find(x=>x.id===sel.bochushi) : null;
  const sc = (gid==='tatami' && sel.shincho===true) ? 10000 : 0;
  return wt.price + mt.add + (sz ? sz.add : 0) + (hr ? hr.add : 0) + (bc ? bc.add : 0) + sc;
}

function calcGenre(gid){
  const sel = selections[gid];
  if(!sel) return 0;
  if(gid==='shoji'||gid==='fusuma'||gid==='amido'){
    const itemTotal = (sel.items||[]).reduce((s,item)=>{
      if(!item.size||!item.qty) return s;
      const pm = OPTIONS[gid].priceMatrix;
      const mat = gid==='amido' ? 'only' : item.material;
      if(!mat) return s;
      const p = pm[item.size]?.[mat]||0;
      return s + p*item.qty;
    },0);
    const tk = (sel.tatekuke||0)*1500;
    return itemTotal + tk;
  }
  return calcUnit(gid) * sel.qty;
}

function grandTotal(){ return selectedGenres.reduce((s,g)=>s+calcGenre(g),0); }

// ===== ステップ =====
function renderSteps(){
  const labels=['種類を選ぶ','施工の詳細','枚数の入力','確認・PDF'];
  let h='';
  labels.forEach((l,i)=>{
    const n=i+1;
    const cur = step===3.5 ? 3.5 : step;
    // step index mapping: 1,2,3,3.5,4 → display 1,2,3,4,5
    const dispN = n; // n is 1-5
    // actual step values: 1,2,3,3.5,4
    const actualSteps=[2,3,3.5,4];
    const actualN=actualSteps[i];
    const cls=cur>actualN?'done':cur===actualN?'active':'';
    const lbl=cur===actualN?'active':'';
    h+=`<div class="sdot"><div class="dot ${cls}">${cur>actualN?'✓':dispN}</div><span class="${lbl}">${l}</span></div>`;
    if(i<labels.length-1) h+=`<div class="sline ${cur>actualN?'done':''}"></div>`;
  });
  document.getElementById('stepsEl').innerHTML=h;
}

// ===== Step1 お客様情報 =====

    <div class="card-heading">👤 お客様の情報</div>
    <div class="card-sub">お名前と住所を入力してください</div>
    <div class="fg"><label class="fl">お客様名 <span class="req">必須</span></label>
      <input type="text" value="${customer.name}" placeholder="例：山田 太郎" oninput="customer.name=this.value"></div>
    <div class="fg"><label class="fl">ご住所 <span class="req">必須</span></label>
      <input type="text" value="${customer.address}" placeholder="例：東京都〇〇区△△ 1-2-3" oninput="customer.address=this.value"></div>
    <div class="fg"><label class="fl">電話番号</label>
      <input type="tel" value="${customer.tel}" placeholder="例：090-0000-0000" oninput="customer.tel=this.value"></div>
    <div class="fg"><label class="fl">施工の希望日</label>
      <input type="date" value="${customer.desiredDate}" oninput="customer.desiredDate=this.value"></div>
    <div class="fg"><label class="fl">ご要望・メモ</label>
      <textarea placeholder="気になることがあればご自由にどうぞ" oninput="customer.memo=this.value">${customer.memo}</textarea></div>

      <button class="btn btn-next" onclick="goS2()">次へ：工事の種類を選ぶ　→</button>
    </div>
  </div>`;

function goStep(n){ step=n; renderFull(); }
function renderFull(){ render(); window.scrollTo({top:0,behavior:'smooth'}); }

function goS2(){ if(!customer.name.trim()||!customer.address.trim()){ alert('お客様名とご住所を入力してください'); return; } goStep(2); }
function goS3(){ if(selectedGenres.length===0){ alert('工事の種類を1つ以上選んでください'); return; } activeGenre=selectedGenres[0]; step=3; renderFull(); }
function goS35(){
  const inc=selectedGenres.find(g=>{
    const s=selections[g];
    if(!s) return true;
    if(g==='tatami') return !s.material;
    if(g==='shoji'||g==='fusuma'||g==='amido'){
      const its=s.items||[];
      return its.length===0 || its.some(it=>!it.size||!it.material||!(it.qty>0));
    }
    if(!s.workType || !s.size) return true;
    return !s.material;
  });
  if(inc){ const gen=GENRES.find(x=>x.id===inc); alert(`「${gen.name}」のサイズ・施工内容・素材を全て選んでください`); activeGenre=inc; render(); return; }
  goStep(3.5);
}
function goS4(){ goStep(4); }

// ===== Step2 ジャンル選択 =====
function renderStep2(){
  const btns = GENRES.map(g=>`
    <div class="genre-btn ${selectedGenres.includes(g.id)?'selected':''}" onclick="toggleGenre('${g.id}')">
      <div class="genre-check">✓</div>
      <div class="gicon">${g.icon}</div>
      <div class="gname">${g.name}</div>
      <div class="gdesc">${g.desc}</div>
    </div>`).join('');
  return `<div class="card fade">
    <div class="card-heading">🏠 工事の種類を選ぶ</div>
    <div class="card-sub">今回お見積もりする工事を選んでください（複数選べます）</div>
    <div class="genre-grid">${btns}</div>
    <div class="btn-row">
      <button class="btn btn-back" onclick="goStep(1)">← 戻る</button>
      <button class="btn btn-next" onclick="goS3()">次へ：詳細を選ぶ　→</button>
    </div>
  </div>`;
}
function toggleGenre(gid){
  if(selectedGenres.includes(gid)){
    selectedGenres=selectedGenres.filter(x=>x!==gid);
    delete selections[gid];
  } else {
    selectedGenres.push(gid);
    const defWork = OPTIONS[gid].workTypes[0]?.id || null;
    if(gid==='shoji'||gid==='fusuma'||gid==='amido'){
      selections[gid]={ items:[{size:null,material:'only',qty:1}], tatekuke:0 };
    } else {
      selections[gid]={ workType:defWork, material:null, heri:null, bochushi:null, shincho:null, size:null, qty:OPTIONS[gid].defaultQty, tatekuke:0 };
    }
  }
  render();
}
function goS3(){
  if(selectedGenres.length===0){ alert('工事の種類を1つ以上選んでください'); return; }
  activeGenre=selectedGenres[0]; step=3; render();
}

    return `<div class="card fade">

      <div class="genre-tabs no-print">${tabs}</div>

      ${itemsHtml}

      <button onclick="addItem('${gid}')" style="width:100%;padding:12px;border:2px dashed var(--green);background:transparent;border-radius:8px;font-size:14px;color:var(--green-dark);cursor:pointer;font-family:inherit;font-weight:500;margin-bottom:16px;">＋ 組み合わせを追加する</button>

      ${gid!=='amido'?`<div class="sec-title">建て付け調整（オプション）</div>

                   border:2px solid var(--green);border-radius:8px;padding:4px;background:white;outline:none;font-family:'Noto Serif JP',serif;"

          ${(sel.tatekuke||0)>0?`<span style="font-size:13px;font-weight:700;color:var(--amber);">= ¥${fmt((sel.tatekuke||0)*1500)}</span>`:''}

        <button class="btn btn-back" onclick="goStep(2)">← 戻る</button>
        ${hasNext
          ?`<button class="btn btn-next" onclick="activeGenre='${nextG.id}';render()">次：${nextG.icon}${nextG.name}へ →</button>`

    <div class="genre-tabs no-print">${tabs}</div>

    ${!isTatami?`<div class="sec-title">① 施工内容</div><div class="opts">${workHtml}</div>`:''}
    ${(sizes.length>0 && !isTatami)?`<div class="sec-title">② サイズ</div><div class="size-grid">${sizeHtml}</div>`:''}

    ${isTatami && !isUra ? `
    <div class="sec-title">① 施工の種類</div>
    <div style="border:2px solid var(--green-light);border-top:none;border-radius:0 0 8px 8px;background:white;overflow:hidden;">
      <div class="opt ${sel.shincho===false?'sel':''}" onclick="setSel('tatami','shincho',false)">
        <div class="oradio ${sel.shincho===false?'on':''}"></div>
        <div class="oinfo"><div class="otitle">表替え</div><div class="onote">表面だけ新しくする（一般的）</div></div>
      </div>
      <div class="opt ${sel.shincho===true?'sel':''}" onclick="setSel('tatami','shincho',true)">
        <div class="oradio ${sel.shincho===true?'on':''}"></div>
        <div class="oinfo"><div class="otitle">新調</div><div class="onote">畳床（芯）から全て新しくする（+¥10,000/枚）</div></div>
      </div>
    </div>` : ''}

    ${isTatami && !isUra && sel.shincho!==null ? `
    <div class="sec-title">② ${sel.shincho?'新調価格（表替え価格+¥10,000）':'表替え価格'}</div>
    <select class="mat-select" onchange="setSel('tatami','material',this.value)">
      <option value="">― 種類を選択 ―</option>
      ${OPTIONS.tatami.materials.filter(m=>sel.shincho ? m.id!=='uragaeshi' : true).map(m=>`
        <option value="${m.id}" ${sel.material===m.id?'selected':''}>${m.label} ／ ¥${fmt(m.add+(sel.shincho&&m.id!=='uragaeshi'?10000:0))}/枚 ― ${m.note}</option>
      `).join('')}
    </select>` : ''}

    ${isTatami && isUra ? `
    <div class="sec-title">① 表替え価格</div>
    <div class="opts">${matHtml}</div>` : ''}

    ${isTatami && !isUra && sel.shincho!==null ? `
    <div class="sec-title">③ 縁（へり）</div>
    <div style="border:2px solid var(--green-light);border-top:none;border-radius:0 0 8px 8px;background:white;overflow:hidden;">
      ${(OPTIONS.tatami.heri||[]).map(h=>`
      <div class="opt ${sel.heri===h.id?'sel':''}" onclick="setSel('tatami','heri','${h.id}')">
        <div class="oradio ${sel.heri===h.id?'on':''}"></div>
        <div class="oinfo"><div class="otitle">${h.label}</div><div class="onote">${h.note}</div></div>
        <div class="oprice">+¥${fmt(h.add)}/枚</div>
      </div>`).join('')}
    </div>
    <div class="sec-title">④ 防虫紙</div>
    <div style="border:2px solid var(--green-light);border-top:none;border-radius:0 0 8px 8px;background:white;overflow:hidden;">
      ${(OPTIONS.tatami.bochushi||[]).map(b=>`
      <div class="opt ${sel.bochushi===b.id?'sel':''}" onclick="setSel('tatami','bochushi','${b.id}')">
        <div class="oradio ${sel.bochushi===b.id?'on':''}"></div>
        <div class="oinfo"><div class="otitle">${b.label}</div><div class="onote">${b.note}</div></div>
        <div class="oprice">${b.add>0?'+¥'+fmt(b.add)+'/枚':'-'}</div>
      </div>`).join('')}
    </div>` : ''}

    <div class="btn-row" style="margin-top:24px;">
      <button class="btn btn-back" onclick="goStep(2)">← 戻る</button>

        ?`<button class="btn btn-next" onclick="activeGenre='${nextG.id}';render()">次：${nextG.icon}${nextG.name}へ →</button>`
        :`<button class="btn btn-next" onclick="goS35()">次へ →</button>`}
    </div>
  </div>`;
}
function setItem(gid,i,field,val){
  selections[gid].items[i][field]=val;
  render();
}
function setItemQty(gid,i,v){
  const n=parseInt(v)||1;
  selections[gid].items[i].qty=Math.max(1,Math.min(99,n));
  const y=window.scrollY; renderSteps(); document.getElementById('content').innerHTML=renderStep3(); window.scrollTo({top:y});
}
function setItemQtyDelta(gid,i,d){
  if(!selections[gid]||!selections[gid].items[i]) return;
  const cur=selections[gid].items[i].qty||1;
  selections[gid].items[i].qty=Math.max(1,Math.min(99,cur+d));
  const item=selections[gid].items[i];
  const opt2=OPTIONS[gid];
  const matKey=gid==='amido'?'only':item.material;
  const rowTotal=(item.size&&matKey&&item.qty)?(opt2.priceMatrix[item.size]?.[matKey]||0)*item.qty:0;
  const qEl=document.getElementById(`qty-${gid}-${i}`);
  const rEl=document.getElementById(`rt-${gid}-${i}`);
  if(qEl) qEl.textContent=item.qty;
  if(rEl) rEl.textContent=rowTotal>0?'= ¥'+fmt(rowTotal):'';
}
function addItem(gid){
  const defMat = gid==='amido'?'only':null;
  selections[gid].items.push({size:null,material:defMat,qty:1});
  render();
}
function removeItem(gid,i){
  selections[gid].items.splice(i,1);
  render();
}
function goS35Items(){
  // 障子・襖の次のジャンルへ、または確認へ
  const idx=selectedGenres.indexOf(activeGenre);
  const hasNext=idx<selectedGenres.length-1;
  if(hasNext){ activeGenre=selectedGenres[idx+1]; render(); return; }
  const hasOthers=selectedGenres.some(g=>g!=='tatami');
  const nonTatami=selectedGenres.filter(g=>g!=='tatami');
  const allShojiFusuma=nonTatami.every(g=>g==='shoji'||g==='fusuma'||g==='amido');
  if(allShojiFusuma){ goStep(4); return; }
  goStep(3.5);
}
function setSel(gid,field,val){
  selections[gid][field]=val;
  // 畳で裏返しを選んだらshincho/heri/bochushiをリセット
  if(gid==='tatami' && field==='material' && val==='uragaeshi'){
    selections[gid].shincho=null; selections[gid].heri=null; selections[gid].bochushi=null;
  }
  // 新調に切り替えたとき裏返しが選ばれていたらリセット
  if(gid==='tatami' && field==='shincho' && val===true && selections[gid].material==='uragaeshi'){
    selections[gid].material=null;
  }
  render();
}
function chQty(gid,d){ selections[gid].qty=Math.max(1,Math.min(99,selections[gid].qty+d)); render(); }
function chQtyInStep3(gid,v){ const n=parseInt(v)||0; selections[gid].qty=Math.max(0,Math.min(99,n)); const y=window.scrollY; renderSteps(); document.getElementById('content').innerHTML=renderStep3(); window.scrollTo({top:y}); }
function chTatekuke(gid,v){ const n=parseInt(v)||0; selections[gid].tatekuke=Math.max(0,Math.min(99,n)); const y=window.scrollY; renderSteps(); document.getElementById('content').innerHTML=renderStep3(); window.scrollTo({top:y}); }
function chQtyVal(gid,v){ const n=parseInt(v)||0; selections[gid].qty=Math.max(0,Math.min(99,n)); renderSteps(); document.getElementById('content').innerHTML=renderStep35(); }
function goS35(){
  const inc=selectedGenres.find(g=>{
    const s=selections[g];
    if(!s) return true;
    if(g==='tatami') return !s.material || !(s.qty>0) || (s.material!=='uragaeshi' && (s.shincho===null || !s.heri || !s.bochushi));
    if(g==='shoji'||g==='fusuma'||g==='amido'){
      const its=s.items||[];
      return its.length===0 || its.some(it=>!it.size||!(it.qty>0));
    }
    if(!s.workType || !s.size) return true;
    return !s.material;
  });
  if(inc){
    const g=GENRES.find(x=>x.id===inc);
    if(g.id==='tatami') alert('商品グレードと枚数を選んでください');
    else alert(`「${g.name}」の施工内容・サイズ・素材を全て選んでください`);
    activeGenre=inc; render(); return;
  }
  const hasOthers=selectedGenres.some(g=>g!=='tatami');
  if(!hasOthers){ goStep(4); return; }
  goStep(3.5);
}

// ===== Step3.5 枚数まとめて入力 =====
function renderStep35(){
  const rows = selectedGenres.filter(gid=>gid!=='tatami').map(gid=>{
    const g=GENRES.find(x=>x.id===gid);
    const opt=OPTIONS[gid];
    const sel=selections[gid];
    const unit=calcUnit(gid);
    return `
    <div style="margin-bottom:20px;background:var(--bg);border:2px solid var(--line);border-radius:10px;padding:16px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span style="font-size:22px;">${g.icon}</span>
        <span style="font-size:16px;font-weight:700;color:var(--green-dark);">${g.name}</span>
        ${unit>0?`<span style="font-size:12px;color:var(--muted);">（¥${fmt(unit)}/${opt.qtyUnit}）</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <label style="font-size:14px;font-weight:700;color:var(--green-dark);white-space:nowrap;">枚数</label>
        <input type="number" min="0" max="99" value="${sel.qty}"
          style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:var(--green-dark);
                 width:80px;text-align:center;border:2px solid var(--green);border-radius:8px;
                 padding:6px 4px;background:white;outline:none;"
          onchange="chQtyVal('${gid}',this.value)">
        <span style="font-size:15px;color:var(--muted);">${opt.qtyUnit}</span>

        ${unit>0 && sel.qty>0 ? `<span style="font-size:14px;font-weight:700;color:var(--amber);">= ¥${fmt(unit*sel.qty)}</span>` : ''}
      </div>
    </div>`;
  }).join('');

  const total=grandTotal();
  const tax=Math.floor(total*0.1);

  return `<div class="card fade">
    <div class="card-heading">枚数を入力する</div>
    <div class="card-sub">障子・襖・網戸の枚数を入力してください</div>
    ${rows}
    ${total>0?`<div class="subtotal-bar" style="margin-top:8px;">概算合計（税抜）：¥${fmt(total)}　／　税込：¥${fmt(total+tax)}</div>`:''}
    <div class="btn-row">
      <button class="btn btn-back" onclick="goStep(3)">← 戻る</button>
      <button class="btn btn-next" onclick="goStep(4)">確認・見積書へ →</button>
    </div>
  </div>`;
}

function goS4(){ step=4; render(); }

// ===== Step4 確認・PDF =====
function buildSummaryBlocks(genreList){
  return genreList.map(gid=>{
    const g=GENRES.find(x=>x.id===gid);
    const sel=selections[gid];
    const opt=OPTIONS[gid];
    const sub=calcGenre(gid);

    // 障子・襖・網戸はitemsで表示
    if(gid==='shoji'||gid==='fusuma'||gid==='amido'){
      const itemRows=(sel.items||[]).map((item,i)=>{
        const sz2=(SIZES[gid]||[]).find(x=>x.id===item.size);
        const mt2=opt.materials.find(x=>x.id===item.material);
        const matKey2=gid==='amido'?'only':item.material;
        const p=item.size?(opt.priceMatrix[item.size]?.[matKey2]||0):0;
        const rowTotal=p*item.qty;
        return `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);background:white;gap:8px;">
          <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
            <span style="background:var(--green-dark);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:50px;white-space:nowrap;">${i+1}</span>
            <span style="font-size:14px;font-weight:500;color:var(--ink);">${sz2?.label||''}${mt2?'　'+mt2.label:''}</span>
          </div>
          <div style="text-align:right;white-space:nowrap;">
            <div style="font-size:12px;color:var(--muted);">¥${fmt(p)} × ${item.qty}枚</div>
            <div style="font-size:15px;font-weight:700;color:var(--amber);">¥${fmt(rowTotal)}</div>
          </div>
        </div>`;
      }).join('');
      const tkRow=(sel.tatekuke||0)>0?`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);background:white;">
          <span style="font-size:14px;color:var(--muted);">建て付け調整　${sel.tatekuke}枚</span>
          <span style="font-size:14px;font-weight:700;color:var(--amber);">¥${fmt(sel.tatekuke*1500)}</span>
        </div>`:'';
      return `<div class="sum-block">
        <div class="sum-head">${g.icon} ${g.name}</div>
        <div class="sum-rows">${itemRows}${tkRow}
          <div class="sum-row" style="background:var(--amber-light)"><span class="lb" style="color:var(--amber);font-weight:700;">小計（税抜）</span><span class="vl"></span><span class="pr" style="color:var(--amber);font-size:15px;">¥${fmt(sub)}</span></div>
        </div>
      </div>`;
    }

    const wt=opt.workTypes?.find(x=>x.id===sel.workType);
    const mt=opt.materials?.find(x=>x.id===sel.material);
    const sz=(SIZES[gid]||[]).find(x=>x.id===sel.size);
    const unit=calcUnit(gid);
    const tax=Math.floor(sub*0.1);
    const withTax=sub+tax;
    return `<div class="sum-block">
      <div class="sum-head">${g.icon} ${g.name}</div>
      <div class="sum-rows">
        ${gid==='tatami'?`<div class="sum-row"><span class="lb">施工内容</span><span class="vl" style="color:${sel.shincho?'var(--amber)':'var(--ink)'};">${sel.shincho?'新調':'表替え'}${sel.material==='uragaeshi'?'（裏返し）':''}</span><span class="pr" style="color:${sel.shincho?'var(--amber)':'var(--muted)'};">${sel.shincho?'+¥10,000/枚':'-'}</span></div>`:`<div class="sum-row"><span class="lb">施工内容</span><span class="vl">${wt.label}</span><span class="pr">¥${fmt(wt.price)}/${opt.qtyUnit}</span></div>`}
        <div class="sum-row"><span class="lb">表替え価格</span><span class="vl">${mt?.label||''}</span><span class="pr">¥${fmt(mt?.add||0)}/枚</span></div>
        ${gid==='tatami' && sel.heri && sel.material!=='uragaeshi' ? `<div class="sum-row"><span class="lb">縁（へり）</span><span class="vl">${(OPTIONS.tatami.heri||[]).find(x=>x.id===sel.heri)?.label||''}</span><span class="pr">+¥${fmt((OPTIONS.tatami.heri||[]).find(x=>x.id===sel.heri)?.add||0)}/枚</span></div>` : ''}
        ${gid==='tatami' && sel.bochushi==='yes' && sel.material!=='uragaeshi' ? `<div class="sum-row"><span class="lb">防虫紙</span><span class="vl">施工する</span><span class="pr">+¥4,000/枚</span></div>` : ''}

        <div class="sum-row"><span class="lb">枚数</span><span class="vl">${sel.qty}${opt.qtyUnit}${gid==='tatami'&&sel.shincho?'　<span style="background:var(--amber);color:white;font-size:10px;padding:1px 6px;border-radius:50px;">新調</span>':''}</span><span class="pr">単価 ¥${fmt(unit)}</span></div>
        ${gid==='shoji' && (sel.tatekuke||0)>0?`<div class="sum-row"><span class="lb">建て付け調整</span><span class="vl">${sel.tatekuke}枚</span><span class="pr">¥${fmt(sel.tatekuke*1500)}</span></div>`:''}
        <div class="sum-row" style="background:var(--amber-light)"><span class="lb" style="color:var(--amber);font-weight:700;">小計（税抜）</span><span class="vl"></span><span class="pr" style="color:var(--amber);font-size:15px;">¥${fmt(sub)}</span></div>
      </div>
    </div>`;
  }).join('');
}

function renderStep4(){
  const base=grandTotal();
  const shokeihi=Math.floor(base*0.05);
  const total=base+shokeihi;
  const tax=Math.floor(total*0.1);
  const withTax=total+tax;

  const customerBlock=`
`;

  const shokeihiBlock=`<div class="sum-block">
    <div class="sum-head">📋 諸経費</div>
    <div class="sum-rows">
      <div class="sum-row">
        <span class="lb">諸経費</span>
        <span class="vl" style="color:var(--muted);font-size:12px;">工事合計の5%</span>
        <span class="pr">¥${fmt(shokeihi)}</span>
      </div>
    </div>
  </div>`;

  const totalBlock=`
    <div class="total-card">
      <div><div class="tl">合計金額（税込）</div><div class="ts">全工事合計＋諸経費　消費税10%含む</div></div>
      <div><div class="ta">¥${fmt(withTax)}</div><div class="tx">税抜 ¥${fmt(total)}　消費税 ¥${fmt(tax)}</div></div>
    </div>
    <div class="notice">
      ※ このお見積もりは現地確認前の概算金額です。<br>
      ※ 実際の金額は現地調査後に正式にご案内します。<br>
      ※ 見積もりの有効期限は発行日より30日間です。
    </div>`;

  return `<div class="card fade">
    <div class="card-heading">📋 見積もり内容の確認</div>
    <div class="card-sub">内容をご確認いただき、PDFで保存してください</div>

    ${customerBlock}
    ${buildSummaryBlocks(selectedGenres)}
    ${shokeihiBlock}
    ${totalBlock}

    <div class="card-heading no-print" style="margin-top:28px;font-size:16px;">🖨 PDF出力の形式を選ぶ</div>
    <div class="pdf-toggle no-print">
      <button class="pdf-toggle-btn ${pdfMode==='combined'?'active':''}" onclick="pdfMode='combined';render()">
        📄 まとめて1枚<br><span style="font-size:11px;font-weight:400;">全工事を1つの見積書に</span>
      </button>
      <button class="pdf-toggle-btn ${pdfMode==='separate'?'active':''}" onclick="pdfMode='separate';render()">
        📑 工事別に別々<br><span style="font-size:11px;font-weight:400;">工事ごとに分けて出力</span>
      </button>
    </div>

    <div class="btn-row no-print">
      <button class="btn btn-back" onclick="goStep(3.5)">← 戻る</button>
      <button class="btn btn-pdf" onclick="doPrint()">🖨　PDFで保存する</button>
    </div>
  </div>`;
}

function doPrint(){
  window.print();
}

// ===== メイン =====
function render(){
  renderSteps();
  let html='';
  if(step===1) html=renderStep1();
  else if(step===2) html=renderStep2();
  else if(step===3) html=renderStep3();
  else if(step===3.5) html=renderStep35();
  else if(step===4) html=renderStep4();
  const prev = document.getElementById('content');
  const scrollY = window.scrollY;
  prev.innerHTML=html;
  window.scrollTo({top:scrollY});
}
render();

// iOS ダブルタップズーム強制無効化
let __lastTouch = 0;
document.addEventListener('touchend', function(e){
  const now = Date.now();
  if(now - __lastTouch <= 400){
    e.preventDefault();
    if(e.target && typeof e.target.click === 'function') e.target.click();
  }
  __lastTouch = now;
}, {passive:false});
document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
</script>
</body>
